server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 55M;

    # Serve static assets with cache headers
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Internal location for X-Accel-Redirect (efficient file serving)
    location /internal/uploads/ {
        internal;
        alias /var/www/html/storage/uploads/;
    }

    location /internal/thumbs/ {
        internal;
        alias /var/www/html/storage/thumbs/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # PHP-FPM
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=55M \n post_max_size=55M";
        include fastcgi_params;
    }

    # Security: deny hidden files
    location ~ /\. {
        deny all;
    }
}
